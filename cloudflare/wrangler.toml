name = "day-trade-scheduler"
main = "worker.js"
compatibility_date = "2024-11-01"

# --- scheduled triggers (all times UTC) ---
[triggers]
crons = [
  "*/10 * * * *",   # keep-warm: ping the dyno every 10 min so it never idles out
  "30 1 * * *",     # nightly deep ML research sweep (after the US close)
  "0 13 * * 1-5",   # daily digest -> webhook, weekdays pre-market
]

# --- config ---
[vars]
BACKEND_URL = "https://day-trade-backend.onrender.com"
# DIGEST_WEBHOOK_URL is a SECRET -- set it with:
#   wrangler secret put DIGEST_WEBHOOK_URL
# (paste a Slack or Discord incoming-webhook URL when prompted)
