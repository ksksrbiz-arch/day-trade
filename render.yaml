# Render blueprint — one-click backend deploy.
# In Render: New + > Blueprint > connect the day-trade repo. It reads this file.
# Then add your secret env vars (see DEPLOY.md) in the service's Environment tab.
services:
  - type: web
    name: day-trade-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/telemetry/topology
    autoDeploy: true
    envVars:
      - key: RUN_DAEMONS
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
      - key: USE_PIECES
        value: "false"          # no local Pieces LTM in the cloud
      # --- TensorTrade RL: ON by default (image bakes in the RL extra). ---
      # The RL DQN votes in the confluence brain and a champion/challenger
      # daemon retrains models on a cadence. Set any to "0"/"false" to disable.
      # NOTE: TensorFlow + periodic training is memory-hungry; if the starter
      # plan OOMs, bump the plan or set RUN_RL_DAEMON=0.
      - key: USE_CONFLUENCE
        value: "true"
      - key: USE_RL_VOICE
        value: "true"
      - key: RUN_RL_DAEMON
        value: "1"
      # --- add these in the Render dashboard (do NOT commit secrets) ---
      # ALPACA_KEY, ALPACA_SECRET, GROQ_KEY, CF_ACCOUNT_ID, CF_API_TOKEN, ...
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1                  # persists sqlite mesh/reasoning/alerts stores
