name = "day-trade-scheduler"
main = "worker.js"
compatibility_date = "2024-11-01"

# --- scheduled triggers (all times UTC) ---
[triggers]
# ONE cron slot (account free-plan limit is 5 total). The Worker keeps the dyno
# warm every tick and time-gates the nightly research (~01:00 UTC) and the daily
# digest (13:00 UTC weekdays) internally -- see worker.js scheduled().
crons = ["*/10 * * * *"]

# --- config ---
[vars]
BACKEND_URL = "https://day-trade-backend.onrender.com"
# DIGEST_WEBHOOK_URL is a SECRET -- set it with:
#   wrangler secret put DIGEST_WEBHOOK_URL
# (paste a Slack or Discord incoming-webhook URL when prompted)
